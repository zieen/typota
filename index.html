<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typota - Premium Markdown Editor</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="Typota - Premium Markdown Editor" />
    <meta name="description" content="A sleek, modern, web-based Markdown editor with live preview, syntax highlighting, and a beautiful dark-mode aesthetic. Free to use locally." />
    <meta name="keywords" content="markdown editor, online markdown, typora alternative, web markdown, text editor, live preview, markdown syntax" />
    <meta name="author" content="Enzii" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://typota.app/" />
    <meta property="og:title" content="Typota - Premium Markdown Editor" />
    <meta property="og:description" content="A sleek, modern, web-based Markdown editor with live preview, syntax highlighting, and a beautiful dark-mode aesthetic." />
    <!-- Ensure `og:image` is set when you deploy the site -->
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://typota.app/" />
    <meta property="twitter:title" content="Typota - Premium Markdown Editor" />
    <meta property="twitter:description" content="A sleek, modern, web-based Markdown editor with live preview, syntax highlighting, and a beautiful dark-mode aesthetic." />
    
    <!-- Thematic color for mobile browsers -->
    <meta name="theme-color" content="#171717" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
